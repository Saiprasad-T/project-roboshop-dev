apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: frontend
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: frontend
  replicas: {{ .Values.deployment.replicas }}
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: frontend   
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.deployment.repository}}:{{ .Values.deployment.tag }}"
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "10m"
              memory: "20Mi"
            limits:
              cpu: "30m"
              memory: "60Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: frontend
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
           nodeSelectorTerms:
              - matchExpressions:
                  - key: tier
                    operator: In
                    values:
                     - database2
      volumes:
        - name: frontend
          configMap:
            name: frontend