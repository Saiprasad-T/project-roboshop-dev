apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart 
spec:
  selector:
    project: roboshop
    tier: backend
    component: cart 
  type: {{ .Values.service.type }}
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080