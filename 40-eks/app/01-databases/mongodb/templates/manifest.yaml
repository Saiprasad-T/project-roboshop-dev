apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec: #statefulset
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb # has to match .spec.template.metadata.labels
  serviceName: "mongo-headless-service"
  replicas: {{ .Values.statefulset.replicas }} # by default is 1
  minReadySeconds: 10 # by default is 0
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongodb
        image: "{{ .Values.statefulset.repository }}:{{ .Values.statefulset.tag }}"
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "20m"
            memory: "300Mi"
          limits:
            cpu: "80m"
            memory: "500Mi"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: mongodb-volume
          mountPath: /data/db
      affinity:
         nodeAffinity:
           requiredDuringSchedulingIgnoredDuringExecution:
             nodeSelectorTerms:
               - matchExpressions:
                   - key: tier
                     operator: In
                     values:
                       - database
  volumeClaimTemplates:
  - metadata:
      name: mongodb-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: my-ebs-sc
      resources:
        requests:
          storage: 1Gi

