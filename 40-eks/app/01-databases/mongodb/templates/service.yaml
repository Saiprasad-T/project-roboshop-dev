apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb 
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb 
  type: {{ .Values.service.type }}
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017