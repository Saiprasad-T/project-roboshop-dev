apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis 
spec:
  selector:
    project: roboshop
    tier: db
    component: redis 
  type: {{ .Values.service.clusterip }}
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379