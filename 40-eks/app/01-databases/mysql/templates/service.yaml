apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql 
spec:
  selector:
    project: roboshop
    tier: db
    component: mysql 
  type: "{{ .Values.service.type }}"
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
